              opt: ["主动介绍团队情况", "热情拉他一起玩", "关心他是否适应", "给他分享工作资料"],

              role: ["巴克队长","呱唧","皮医生","谢灵通"] },
            { q: "你如何记录生活？",

              role: ["达西西","呱唧","小萝卜","章教授"] },
            { q: "你更喜欢哪种植物？", 
              opt: ["仙人掌", "爬山虎", "芦荟", "蔬菜"],
              role: ["巴克队长","呱唧","皮医生","小萝卜"] },
            { q: "你如何看待时间管理？", 
              opt: ["严格按计划执行", "随心所欲，看心情", "把时间留给重要的人", "记录时间去向，分析优化"],
              role: ["巴克队长","呱唧","皮医生","达西西"] },
            { q: "你更喜欢哪种气候？", 
              opt: ["寒带", "温带", "极地", "海洋性"],

              opt: ["拥抱他", "讲笑话", "陪他坐着，不说话", "分析为什么哭"],

            { q: "你更喜欢哪种餐具？",

              role: ["巴克队长","呱唧","皮医生","小萝卜"] },

              opt: ["古典", "摇滚", "轻音乐", "电子"],

              opt: ["有用的信息渠道", "分享生活的地方", "保持联系的工具", "研究舆论的素材"],
              role: ["巴克队长","呱唧","皮医生","达西西"] }
        ]; // 共60题

        // ----- 初始化得分映射 -----
        let scores = {
            "巴克队长": 0, "呱唧": 0, "皮医生": 0, "谢灵通": 0,
            "达西西": 0, "突突兔": 0, "章教授": 0, "小萝卜": 0
        };

        // ----- 测试状态 -----
        let currentIdx = 0;
        let answers = new Array(60).fill(null); // 存储选项索引

        // DOM元素
        const quizDiv = document.getElementById('quizContainer');
        const resultDiv = document.getElementById('resultContainer');
        const questionText = document.getElementById('questionText');
        const optionsDiv = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const counterSpan = document.getElementById('questionCounter');
        const progressFill = document.getElementById('progress-fill');
        const restartBtn = document.getElementById('restartBtn');

        // 渲染当前题目
        function renderQuestion() {
            const q = questions[currentIdx];
            questionText.innerText = `${currentIdx+1}. ${q.q}`;
            let htmlStr = '';
            q.opt.forEach((opt, idx) => {
                const selectedClass = answers[currentIdx] === idx ? 'selected' : '';
                htmlStr += `<div class="option-btn ${selectedClass}" data-opt-index="${idx}">${opt}</div>`;
            });
            optionsDiv.innerHTML = htmlStr;

            // 绑定选项点击事件
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const optIndex = parseInt(btn.dataset.optIndex);
                    if (answers[currentIdx] === optIndex) return; // 已选相同
                    answers[currentIdx] = optIndex;
                    // 样式更新
                    optionsDiv.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');

                    // 自动跳转
                    if (currentIdx < 59) {
                        currentIdx++;
                        renderQuestion();
                    } else {
                        // 最后一题，计算并显示结果
                        computeResults();
                    }
                });
            });

            counterSpan.innerText = `第 ${currentIdx+1} / 60 题`;
            progressFill.style.width = `${((currentIdx+1)/60)*100}%`;
            prevBtn.disabled = (currentIdx === 0);
        }

        // 上一题
        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            }
        }

        // 计算结果
        function computeResults() {
            // 重置分数
            for (let r in scores) scores[r] = 0;

            // 累加答案分数
            for (let i = 0; i < answers.length; i++) {
                const ansIdx = answers[i];
                if (ansIdx === null) continue; // 理论上不会，但防御
                // 获取该题目选项对应的角色
                const role = questions[i].role[ansIdx];
                if (role) scores[role] += 1;
            }

            // 最高分角色
            let maxRole = ROLES.reduce((a, b) => scores[a] > scores[b] ? a : b);
            showResult(maxRole);
        }

        // 显示结果
        function showResult(topRole) {
            quizDiv.style.display = 'none';
            resultDiv.style.display = 'block';

            document.getElementById('resultRole').innerText = topRole;
            const emojiMap = {
                "巴克队长": "🐻‍❄️", "呱唧": "🐈", "皮医生": "🐧", "谢灵通": "🦦",
                "达西西": "🐕", "突突兔": "🐇", "章教授": "🐙", "小萝卜": "🥕"
            };
            document.getElementById('resultEmoji').innerText = emojiMap[topRole] || "🐟";

            // 柱状图
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ROLES,
                    datasets: [{
                        label: '匹配度',
                        data: ROLES.map(r => scores[r]),
                        backgroundColor: 'rgba(255, 206, 86, 0.8)',
                        borderColor: '#ffbc6c',
                        borderWidth: 2,
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#4f8daa' }, ticks: { color: '#cbe5ff' } },
                        x: { ticks: { color: '#f0e6cc', font: { size: 10 } } }
                    }
                }
            });

            // 详细分析 (约400字)
            let analysis = "";
            if (topRole === "巴克队长") {
                analysis = "🐻‍❄️ 巴克队长 —— 北极熊，天生的领导者。你沉稳可靠，富有责任感，总能在混乱中建立秩序。你像巴克一样，善于组织协调，照顾每一位队员，但也偶尔会因过于严肃而给人距离感。你相信纪律和准备是成功的关键，你的存在就是团队的定海神针。在生活中，你往往是朋友信赖的决策者，喜欢提前规划，但也别忘了偶尔放松，享受随性的快乐。";
            } else if (topRole === "呱唧") {
                analysis = "🐈 呱唧 —— 橘猫，冒险家。你热情奔放，充满好奇心，永远在寻找下一个刺激。你乐观幽默，能用笑声感染所有人，但也可能因为冲动而忽略风险。你像呱唧一样，喜欢探索未知，讨厌一成不变，是团队里的活力源泉。生活中你追求自由，讨厌被束缚，但也需要学会倾听和耐心，让冒险更有价值。";
            } else if (topRole === "皮医生") {
                analysis = "🐧 皮医生 —— 企鹅，温柔的医疗官。你善良体贴，总是先考虑他人的感受。你敏感细腻，能察觉别人忽略的情绪，但也容易过度承担他人的痛苦。像皮医生一样，你用自己的方式守护着身边的人，哪怕自己害怕也会挺身而出。生活中你是绝佳的倾听者和安慰者，但要记得照顾好自己的情绪。";
            } else if (topRole === "谢灵通") {
                analysis = "🦦 谢灵通 —— 海獭，科学家。你理性严谨，对世界充满好奇，喜欢钻研一切现象背后的原理。你有时会因专注而忽略周围，但你的知识储备常常能解决大问题。像谢灵通一样，你享受学习和分析，但偶尔也需要放下数据，用心感受世界。生活中你是朋友眼中的“百科全书”，但别忘了知识之外还有温情。";
            } else if (topRole === "达西西") {
                analysis = "🐕 达西西 —— 腊肠狗，技术专家。你冷静客观，善于记录和整理信息。你擅长使用工具和技术，总能为团队提供关键数据和影像。像达西西一样，你低调却不可或缺，喜欢用逻辑解决问题。生活中你可能显得有点“理工男/女”，但你的条理和细致让一切井井有条。不妨多些感性表达，让人更懂你的温暖。";
